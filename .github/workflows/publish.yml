name: Publish to PyPI

# Publishes a new release to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in secrets.
# One-time setup on PyPI: project Settings -> Publishing -> add a trusted
# publisher with owner "sergio-gracia", repo "foldreport",
# workflow "publish.yml", environment "pypi".

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so setuptools-scm can derive the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/foldreport/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
