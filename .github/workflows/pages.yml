name: Deploy demo report to Pages

# Builds the demo report from the bundled example dataset and publishes it to
# GitHub Pages, so anyone can open a live, interactive FoldReport without
# installing anything. The published file is the exact output of `foldreport`,
# rebuilt on every push to main — no generated HTML is committed to the repo.
#
# One-time setup: repository Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, the site is served at
# https://sergio-gracia.github.io/foldreport/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FoldReport
        run: python -m pip install .

      - name: Build demo report
        run: |
          mkdir -p site
          foldreport \
            examples/demo/colabfold \
            examples/demo/af3_server \
            examples/demo/boltz \
            examples/demo/openfold3 \
            -o site/index.html \
            -t "FoldReport — live demo report"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
