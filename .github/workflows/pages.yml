name: Deploy demo report to Pages

# Builds the demo report from the bundled example dataset and publishes it to
# GitHub Pages, so anyone can open a live, interactive FoldReport without
# installing anything. The published file is the exact output of `foldreport`,
# rebuilt on every push to main — no generated HTML is committed to the repo.
#
# One-time setup: repository Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, the site is served at
# https://sergio-gracia.github.io/foldreport/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FoldReport
        run: python -m pip install .

      - name: Build demo report
        # Preferred demo: the SAME protein (ubiquitin, 76 aa) predicted by several
        # tools, in examples/multimodel_demo/. Each tool has its own subfolder;
        # alphafold_db/ ships a real AlphaFold DB download, the rest are populated
        # by the user (see that folder's README). Empty placeholder folders hold
        # only a hidden .gitkeep, so `ls` (no -A) reports them as empty.
        #
        # Until at least two tools there have real results, fall back to the
        # examples/afdb_demo sample (real AlphaFold DB proteins: insulin,
        # polyubiquitin-C, lysozyme C, hemoglobin alpha) so the page is never empty.
        run: |
          mkdir -p site
          dirs=""
          n=0
          for d in alphafold_db colabfold af3_server boltz openfold3; do
            p="examples/multimodel_demo/$d"
            if [ -d "$p" ] && [ -n "$(ls "$p" 2>/dev/null)" ]; then
              dirs="$dirs $p"
              n=$((n + 1))
            fi
          done
          if [ "$n" -ge 2 ]; then
            echo "Building multi-model demo from:$dirs"
            foldreport $dirs \
              -o site/index.html \
              -t "FoldReport — one protein (ubiquitin), multiple models"
          else
            echo "Multi-model set not ready ($n tool folder(s)); using AlphaFold DB sample."
            foldreport \
              examples/afdb_demo \
              -o site/index.html \
              -t "FoldReport — live demo (real AlphaFold DB proteins)"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
