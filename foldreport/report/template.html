<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
:root {
  --bg: #eef1f5; --bg-grad: radial-gradient(1200px 600px at 80% -10%, #e7edf6 0%, #eef1f5 60%);
  --card: #ffffff; --panel: #ffffff; --ink: #14181d; --muted: #69757f;
  --line: #e1e6ec; --line-soft: #eef1f5; --accent: #2563eb; --accent-soft: #eaf1ff;
  --chip: #f1f4f8; --shadow: 0 1px 2px rgba(16,24,40,0.04), 0 4px 16px rgba(16,24,40,0.05);
  --plate: #ffffff; --th-bg: #f7f9fc; --row-hover: #f3f8ff;
  --gold: #d4a017; --silver: #9aa6b2; --bronze: #c08457;
}
:root[data-theme="dark"] {
  --bg: #0e1217; --bg-grad: radial-gradient(1200px 600px at 80% -10%, #16202c 0%, #0e1217 60%);
  --card: #161c24; --panel: #1a212b; --ink: #e6ebf1; --muted: #8a97a4;
  --line: #2a323d; --line-soft: #222a34; --accent: #5b9bff; --accent-soft: #1c2b44;
  --chip: #212a35; --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.35);
  --plate: #ffffff; --th-bg: #1b232e; --row-hover: #1d2632;
  --gold: #d9b24a; --silver: #9aa6b2; --bronze: #c08457;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0e1217; --bg-grad: radial-gradient(1200px 600px at 80% -10%, #16202c 0%, #0e1217 60%);
    --card: #161c24; --panel: #1a212b; --ink: #e6ebf1; --muted: #8a97a4;
    --line: #2a323d; --line-soft: #222a34; --accent: #5b9bff; --accent-soft: #1c2b44;
    --chip: #212a35; --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.35);
    --plate: #ffffff; --th-bg: #1b232e; --row-hover: #1d2632;
  }
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--ink); background: var(--bg); background-image: var(--bg-grad);
  background-attachment: fixed; line-height: 1.5;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
/* --- Header --- */
header {
  padding: 26px 32px 22px; border-bottom: 1px solid var(--line);
  background: var(--card); box-shadow: var(--shadow);
}
.header-inner { max-width: 1200px; margin: 0 auto; }
.header-top { display: flex; align-items: flex-start; gap: 14px; }
.brand { display: flex; align-items: center; gap: 11px; flex: 1; min-width: 0; }
.brand-mark {
  flex: none; width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 17px;
  box-shadow: 0 2px 8px rgba(37,99,235,0.35); letter-spacing: -0.5px;
}
header h1 { margin: 0; font-size: 22px; font-weight: 650; letter-spacing: -0.3px; }
header .sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
.theme-toggle {
  flex: none; width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
  background: var(--card); color: var(--muted); cursor: pointer; font-size: 16px;
  display: grid; place-items: center; transition: all 0.15s;
}
.theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
/* --- Summary stat cards --- */
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 20px; }
.summary .stat {
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 12px 14px; font-size: 11.5px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.summary .stat b { display: block; font-size: 21px; color: var(--ink); margin-top: 5px;
  text-transform: none; letter-spacing: -0.3px; font-weight: 650; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; }
main { padding: 28px 32px 72px; max-width: 1200px; margin: 0 auto; }
section { margin-bottom: 44px; }
h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
  border-bottom: 1px solid var(--line); padding-bottom: 8px; margin: 0 0 16px; font-weight: 650; }
/* --- Ranking table --- */
.table-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
  box-shadow: var(--shadow); overflow: hidden; }
table.rank { width: 100%; border-collapse: collapse; font-size: 13px; }
table.rank th, table.rank td { padding: 9px 12px; text-align: right; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
table.rank tbody tr:last-child td { border-bottom: 0; }
table.rank th:first-child, table.rank td:first-child,
table.rank th.txt, table.rank td.txt { text-align: left; }
table.rank th { cursor: pointer; user-select: none; background: var(--th-bg); position: sticky; top: 0;
  font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted);
  font-weight: 650; z-index: 2; }
table.rank th:hover { color: var(--accent); }
table.rank th[data-asc="true"]::after { content: " \2191"; color: var(--accent); }
table.rank th[data-asc="false"]::after { content: " \2193"; color: var(--accent); }
table.rank tbody tr { transition: background 0.1s; }
table.rank tbody tr:nth-child(even) { background: color-mix(in srgb, var(--line-soft) 45%, transparent); }
table.rank tbody tr:hover { background: var(--row-hover); }
table.rank td.na { color: var(--muted); opacity: 0.6; }
table.rank tbody td:nth-child(4) { font-variant-numeric: tabular-nums; font-weight: 600; }
table.rank td { font-variant-numeric: tabular-nums; }
/* Medal accent for the top three rows */
tr.top1 td:first-child, tr.top2 td:first-child, tr.top3 td:first-child {
  position: relative; font-weight: 700; }
tr.top1 td:first-child { box-shadow: inset 3px 0 0 var(--gold); }
tr.top2 td:first-child { box-shadow: inset 3px 0 0 var(--silver); }
tr.top3 td:first-child { box-shadow: inset 3px 0 0 var(--bronze); }
.mdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  vertical-align: middle; box-shadow: 0 0 0 1.5px color-mix(in srgb, var(--card) 60%, transparent); }
a.jump { color: var(--accent); text-decoration: none; font-weight: 500; }
a.jump:hover { text-decoration: underline; }
/* --- Cards --- */
.card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
  padding: 20px 22px; margin-bottom: 20px; box-shadow: var(--shadow); scroll-margin-top: 16px; }
.card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.card h3 { margin: 0; font-size: 16px; font-weight: 650; letter-spacing: -0.2px; }
.to-top { font-size: 11px; color: var(--muted); text-decoration: none; white-space: nowrap; }
.to-top:hover { color: var(--accent); }
.card .meta { color: var(--muted); font-size: 12px; margin: 3px 0 14px; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip { background: var(--chip); border: 1px solid var(--line-soft); border-radius: 8px;
  padding: 5px 11px; font-size: 12px; color: var(--muted); }
.chip b { color: var(--ink); font-weight: 650; }
.grid { display: grid; grid-template-columns: 360px 1fr; gap: 22px; align-items: start; }
@media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
.panel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted); font-weight: 650; margin-bottom: 7px; }
.panel-hint { text-transform: none; letter-spacing: 0; font-weight: 400; opacity: 0.8; }
.viewer { position: relative; width: 100%; height: 320px; border: 1px solid var(--line);
  border-radius: 10px; background: var(--plate); overflow: hidden; }
.viewer-toolbar { position: absolute; top: 7px; right: 7px; display: flex; gap: 4px; z-index: 5; }
.viewer-btn { padding: 3px 8px; border: 1px solid #d8dee6; border-radius: 6px;
  background: rgba(255,255,255,0.94); color: #5a6672; font-size: 11px; line-height: 1.3;
  cursor: pointer; transition: all 0.15s; }
.viewer-btn:hover { color: var(--accent); border-color: var(--accent); }
.viewer-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.viewer-btn:disabled { opacity: 0.4; cursor: default; }
.figs img { width: 100%; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 6px; background: var(--plate); }
.na-fig { color: var(--muted); font-size: 12px; font-style: italic; padding: 8px 0; }
.dl-row { display: flex; align-items: center; gap: 8px; margin: 2px 0 18px; font-size: 11px; flex-wrap: wrap; }
.dl-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.dl { color: var(--accent); text-decoration: none; border: 1px solid var(--line); border-radius: 6px;
  padding: 3px 9px; background: var(--card); transition: all 0.15s; }
.dl:hover { background: var(--accent-soft); border-color: var(--accent); }
.legend { display: flex; gap: 13px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-top: 9px; }
.legend span i { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
footer { text-align: center; color: var(--muted); font-size: 12px; padding: 28px; }
/* --- Filter bar --- */
.filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.filters input[type="text"] { padding: 7px 13px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; background: var(--card); color: var(--ink); min-width: 200px; box-shadow: var(--shadow); }
.filters input[type="text"]:focus { outline: none; border-color: var(--accent); }
.filters input[type="text"]::placeholder { color: var(--muted); }
#tool-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filters .tool-btn { padding: 5px 13px; border: 1px solid var(--line); border-radius: 999px; font-size: 12px; background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.filters .tool-btn:hover, .filters .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filters label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.filters input[type="range"] { width: 120px; accent-color: var(--accent); }
.filter-count { font-size: 12px; color: var(--muted); margin-left: auto; font-variant-numeric: tabular-nums; }
/* --- Provenance panel --- */
.provenance { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 12px; }
.provenance summary { cursor: pointer; font-size: 12px; color: var(--muted); user-select: none; font-weight: 600; }
.provenance summary:hover { color: var(--accent); }
.provenance[open] summary { color: var(--ink); margin-bottom: 12px; }
.prov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px 20px; font-size: 12px; }
.prov-item { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px dotted var(--line); padding: 4px 0; }
.prov-item span { color: var(--muted); }
.prov-item b { color: var(--ink); text-align: right; word-break: break-word; font-weight: 600; }
.prov-na { color: var(--muted); font-style: italic; border: 0; }
.prov-sub { grid-column: 1 / -1; margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); font-weight: 650; }
/* --- Interactive PAE --- */
.pae-container { position: relative; display: inline-block; }
.pae-canvas { border: 1px solid var(--line); border-radius: 10px; background: var(--plate); max-width: 100%; cursor: crosshair; }
.pae-tooltip { position: absolute; display: none; background: rgba(0,0,0,0.88); color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; white-space: nowrap; z-index: 10; }
/* PAE color-scale legend (mirrors the JS gradient: dark green = low error -> white) */
.pae-scale { margin: 8px 0 4px; max-width: 400px; }
.pae-scale-cap { font-size: 11px; color: var(--muted); }
.pae-scale-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.pae-scale-end { font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.pae-scale-bar { flex: 1; height: 10px; border-radius: 3px; border: 1px solid var(--line);
  background: linear-gradient(to right, rgb(0,68,27), rgb(247,252,245)); }
/* --- Print: keep cards intact, drop chrome --- */
@media print {
  body { background: #fff; }
  header, .card, .table-wrap { box-shadow: none; }
  .theme-toggle, .filters, .viewer-toolbar, .to-top, .dl-row { display: none !important; }
  .card { break-inside: avoid; page-break-inside: avoid; border-color: #ccc; }
  .summary .stat { border-color: #ccc; }
}
</style>

<script>
// ---- Dark / light theme toggle ----
// Defaults to the OS preference; the button flips it and remembers the choice for this
// report (localStorage is best-effort and ignored when the file is opened via file://
// in some browsers, which is fine — the OS preference still applies).
(function () {
  var btn = document.getElementById("theme-toggle");
  if (!btn) return;
  var root = document.documentElement;
  var SUN = "☀", MOON = "☽";
  function prefersDark() {
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function isDark() {
    var t = root.getAttribute("data-theme");
    if (t === "dark") return true;
    if (t === "light") return false;
    return prefersDark();
  }
  function sync() { btn.innerHTML = isDark() ? SUN : MOON; }
  try {
    var saved = localStorage.getItem("foldreport-theme");
    if (saved === "dark" || saved === "light") root.setAttribute("data-theme", saved);
  } catch (e) {}
  sync();
  btn.addEventListener("click", function () {
    var next = isDark() ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("foldreport-theme", next); } catch (e) {}
    sync();
  });
})();
</script>
<script>
// ---- Sortable ranking table ----
(function () {
  var table = document.getElementById("rank-table");
  if (!table) return;
  var headers = table.querySelectorAll("th");
  headers.forEach(function (th, idx) {
    th.addEventListener("click", function () {
      var asc = th.getAttribute("data-asc") !== "true";
      headers.forEach(function (h) { h.removeAttribute("data-asc"); });
      th.setAttribute("data-asc", asc ? "true" : "false");
      sortBy(idx, asc);
    });
  });
  function sortBy(col, asc) {
    var tbody = table.tBodies[0];
    var rows = Array.prototype.slice.call(tbody.rows);
    rows.sort(function (a, b) {
      var x = a.cells[col].getAttribute("data-v");
      var y = b.cells[col].getAttribute("data-v");
      var nx = parseFloat(x), ny = parseFloat(y);
      var bothNum = !isNaN(nx) && !isNaN(ny);
      if (bothNum) return asc ? nx - ny : ny - nx;
      x = (x || "").toLowerCase(); y = (y || "").toLowerCase();
      if (x < y) return asc ? -1 : 1;
      if (x > y) return asc ? 1 : -1;
      return 0;
    });
    rows.forEach(function (r) { tbody.appendChild(r); });
  }
})();
</script>

<script>
// ---- Table filtering ----
(function () {
  var table = document.getElementById("rank-table");
  if (!table) return;
  var tbody = table.tBodies[0];
  var nameInput = document.getElementById("filter-name");
  var confSlider = document.getElementById("filter-conf");
  var confVal = document.getElementById("conf-val");
  var countEl = document.getElementById("filter-count");
  var toolDiv = document.getElementById("tool-filters");
  // Discover tools from table data
  var rows = Array.prototype.slice.call(tbody.rows);
  var tools = [];
  rows.forEach(function (r) {
    var t = r.cells[2].getAttribute("data-v");
    if (t && tools.indexOf(t) === -1) tools.push(t);
  });
  tools.sort();
  // Build tool toggle buttons
  var activeTools = {};
  tools.forEach(function (t) {
    activeTools[t] = true;
    var btn = document.createElement("button");
    btn.className = "tool-btn active";
    btn.textContent = t;
    btn.setAttribute("data-tool", t);
    btn.addEventListener("click", function () {
      activeTools[t] = !activeTools[t];
      btn.classList.toggle("active", activeTools[t]);
      applyFilters();
    });
    toolDiv.appendChild(btn);
  });
  confSlider.addEventListener("input", function () {
    confVal.textContent = confSlider.value;
    applyFilters();
  });
  nameInput.addEventListener("input", applyFilters);
  function applyFilters() {
    var query = (nameInput.value || "").toLowerCase();
    var minConf = parseFloat(confSlider.value) || 0;
    var visible = 0;
    rows.forEach(function (r) {
      var name = (r.cells[1].getAttribute("data-v") || "").toLowerCase();
      var tool = r.cells[2].getAttribute("data-v") || "";
      var conf = parseFloat(r.cells[3].getAttribute("data-v"));
      var show = true;
      if (query && name.indexOf(query) === -1) show = false;
      if (!activeTools[tool]) show = false;
      if (!isNaN(conf) && conf < minConf) show = false;
      r.style.display = show ? "" : "none";
      if (show) visible++;
    });
    countEl.textContent = visible + " / " + rows.length;
  }
  applyFilters();
})();

// ---- Interactive PAE heatmaps ----
(function () {
  if (typeof FOLDREPORT_PAE === "undefined") return;
  // Greens_r-like colormap: dark green (low error) → white (high error)
  function paeColor(val, maxVal) {
    var t = Math.min(val / maxVal, 1.0);
    // Greens_r: low values = dark green, high values = light/white
    var r = Math.round(247 - (247 - 0) * (1 - t));
    var g = Math.round(252 - (252 - 68) * (1 - t));
    var b = Math.round(245 - (245 - 27) * (1 - t));
    return "rgb(" + r + "," + g + "," + b + ")";
  }
  function drawPAE(canvasId, tipId, data) {
    var canvas = document.getElementById(canvasId);
    var tip = document.getElementById(tipId);
    if (!canvas || !data) return;
    var size = data.size;
    var matrix = data.matrix;
    var maxVal = Math.max(data.max_val, 1);
    var boundaries = data.chain_boundaries || [];
    var px = Math.min(Math.floor(400 / size), 8);
    if (px < 1) px = 1;
    var dim = size * px;
    canvas.width = dim;
    canvas.height = dim;
    canvas.style.width = Math.min(dim, 400) + "px";
    canvas.style.height = Math.min(dim, 400) + "px";
    var ctx = canvas.getContext("2d");
    // Draw heatmap
    for (var i = 0; i < size; i++) {
      for (var j = 0; j < size; j++) {
        ctx.fillStyle = paeColor(matrix[i][j], maxVal);
        ctx.fillRect(j * px, i * px, px, px);
      }
    }
    // Draw chain boundaries
    ctx.strokeStyle = "rgba(0,0,0,0.5)";
    ctx.lineWidth = 1;
    boundaries.forEach(function (b) {
      var pos = b * px;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, dim); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(dim, pos); ctx.stroke();
    });
    // Tooltip
    canvas.addEventListener("mousemove", function (e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      var cx = Math.floor((e.clientX - rect.left) * scaleX / px);
      var cy = Math.floor((e.clientY - rect.top) * scaleY / px);
      if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
        tip.style.display = "block";
        tip.style.left = (e.clientX - rect.left + 12) + "px";
        tip.style.top = (e.clientY - rect.top - 28) + "px";
        tip.textContent = "Scored: " + (cx + 1) + ", Aligned: " + (cy + 1) + " \u2014 " + matrix[cy][cx].toFixed(1) + " \u00C5";
      } else {
        tip.style.display = "none";
      }
    });
    canvas.addEventListener("mouseleave", function () {
      tip.style.display = "none";
    });
  }
  function initPAE() {
    Object.keys(FOLDREPORT_PAE).forEach(function (id) {
      drawPAE("pae-" + id, "pae-tip-" + id, FOLDREPORT_PAE[id]);
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initPAE);
  } else {
    initPAE();
  }
})();
</script>
<script>
// ---- 3D viewers, colored by pLDDT ----
