<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
:root {
  --bg: #f6f7f9; --card: #ffffff; --ink: #1a1f24; --muted: #6b7783;
  --line: #e3e7eb; --accent: #2563eb; --chip: #eef2f7;
}
* { box-sizing: border-box; }
body {
  margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--ink); background: var(--bg); line-height: 1.45;
}
header { padding: 28px 32px 16px; border-bottom: 1px solid var(--line); background: var(--card); }
header h1 { margin: 0 0 4px; font-size: 22px; }
header .sub { color: var(--muted); font-size: 13px; }
.summary { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 14px; }
.summary .stat { font-size: 13px; color: var(--muted); }
.summary .stat b { display: block; font-size: 20px; color: var(--ink); }
main { padding: 24px 32px 64px; max-width: 1200px; margin: 0 auto; }
section { margin-bottom: 40px; }
h2 { font-size: 16px; border-bottom: 2px solid var(--line); padding-bottom: 6px; }
table.rank { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--card); }
table.rank th, table.rank td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--line); white-space: nowrap; }
table.rank th:first-child, table.rank td:first-child,
table.rank th.txt, table.rank td.txt { text-align: left; }
table.rank th { cursor: pointer; user-select: none; background: #fbfcfd; position: sticky; top: 0; }
table.rank th:hover { color: var(--accent); }
table.rank tbody tr:hover { background: #f0f6ff; }
table.rank td.na { color: #b3bcc4; }
a.jump { color: var(--accent); text-decoration: none; }
a.jump:hover { text-decoration: underline; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 18px 20px; margin-bottom: 22px; }
.card h3 { margin: 0 0 2px; font-size: 15px; }
.card .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.chip { background: var(--chip); border-radius: 999px; padding: 4px 11px; font-size: 12px; }
.chip b { color: var(--ink); }
.grid { display: grid; grid-template-columns: 360px 1fr; gap: 18px; align-items: start; }
@media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
.viewer { position: relative; width: 100%; height: 320px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.viewer-toolbar { position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; z-index: 5; }
.viewer-btn { padding: 3px 8px; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,0.92); color: var(--muted); font-size: 11px; line-height: 1.3; cursor: pointer; transition: all 0.15s; }
.viewer-btn:hover { color: var(--accent); border-color: var(--accent); }
.viewer-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.viewer-btn:disabled { opacity: 0.4; cursor: default; }
.figs img { width: 100%; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; background: #fff; }
.na-fig { color: var(--muted); font-size: 12px; font-style: italic; padding: 8px 0; }
.dl-row { display: flex; align-items: center; gap: 8px; margin: -4px 0 16px; font-size: 11px; flex-wrap: wrap; }
.dl-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.dl { color: var(--accent); text-decoration: none; border: 1px solid var(--line); border-radius: 5px; padding: 2px 8px; background: #fff; }
.dl:hover { text-decoration: underline; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-top: 6px; }
.legend span i { display: inline-block; width: 11px; height: 11px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
/* --- Filter bar --- */
.filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.filters input[type="text"] { padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; font-size: 13px; background: var(--card); color: var(--ink); min-width: 180px; }
.filters input[type="text"]::placeholder { color: var(--muted); }
.filters .tool-btn { padding: 4px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 12px; background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.filters .tool-btn:hover, .filters .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filters label { font-size: 12px; color: var(--muted); }
.filters input[type="range"] { width: 120px; accent-color: var(--accent); }
.filter-count { font-size: 12px; color: var(--muted); margin-left: auto; }
/* --- Provenance panel --- */
.provenance { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px; }
.provenance summary { cursor: pointer; font-size: 12px; color: var(--muted); user-select: none; }
.provenance summary:hover { color: var(--accent); }
.provenance[open] summary { color: var(--ink); margin-bottom: 10px; }
.prov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px 18px; font-size: 12px; }
.prov-item { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px dotted var(--line); padding: 3px 0; }
.prov-item span { color: var(--muted); }
.prov-item b { color: var(--ink); text-align: right; word-break: break-word; }
.prov-na { color: var(--muted); font-style: italic; border: 0; }
.prov-sub { grid-column: 1 / -1; margin-top: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
/* --- Interactive PAE --- */
.pae-container { position: relative; display: inline-block; }
.pae-canvas { border: 1px solid var(--line); border-radius: 8px; background: #fff; max-width: 100%; cursor: crosshair; }
.pae-tooltip { position: absolute; display: none; background: rgba(0,0,0,0.85); color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; white-space: nowrap; z-index: 10; }
</style>
</head>
<body>
<header>
  <h1>__TITLE__</h1>
  <div class="sub">Generated by FoldReport v__VERSION__ on __GENERATED__</div>
  <div class="summary">__SUMMARY__</div>
</header>
<main>
  <section id="ranking">
    <h2>Ranking by confidence</h2>
    <div class="filters">
      <input type="text" id="filter-name" placeholder="Search predictions...">
      <div id="tool-filters"></div>
      <label>Min confidence: <input type="range" id="filter-conf" min="0" max="1" step="0.01" value="0"><span id="conf-val">0</span></label>
      <span class="filter-count" id="filter-count"></span>
    </div>
    <table class="rank" id="rank-table">
      __RANKING_TABLE__
    </table>
  </section>
  <section id="details">
    <h2>Per-prediction detail</h2>
    __DETAIL_CARDS__
  </section>
</main>
<footer>One self-contained file &mdash; no internet connection or adjacent files required.</footer>

<script>
// ---- Sortable ranking table ----
(function () {
  var table = document.getElementById("rank-table");
  if (!table) return;
  var headers = table.querySelectorAll("th");
  headers.forEach(function (th, idx) {
    th.addEventListener("click", function () {
      var asc = th.getAttribute("data-asc") !== "true";
      headers.forEach(function (h) { h.removeAttribute("data-asc"); });
      th.setAttribute("data-asc", asc ? "true" : "false");
      sortBy(idx, asc);
    });
  });
  function sortBy(col, asc) {
    var tbody = table.tBodies[0];
    var rows = Array.prototype.slice.call(tbody.rows);
    rows.sort(function (a, b) {
      var x = a.cells[col].getAttribute("data-v");
      var y = b.cells[col].getAttribute("data-v");
      var nx = parseFloat(x), ny = parseFloat(y);
      var bothNum = !isNaN(nx) && !isNaN(ny);
      if (bothNum) return asc ? nx - ny : ny - nx;
      x = (x || "").toLowerCase(); y = (y || "").toLowerCase();
      if (x < y) return asc ? -1 : 1;
      if (x > y) return asc ? 1 : -1;
      return 0;
    });
    rows.forEach(function (r) { tbody.appendChild(r); });
  }
})();
</script>

<script>
// ---- Embedded provenance (machine-readable, for reproducibility) ----
// Keyed by viewer id; mirrors the "Provenance & reproducibility" panel on each card so
// a reviewer or script can recover what produced every figure straight from this file.
var FOLDREPORT_PROVENANCE = __PROVENANCE_JSON__;

<script>
// ---- Table filtering ----
(function () {
  var table = document.getElementById("rank-table");
  if (!table) return;
  var tbody = table.tBodies[0];
  var nameInput = document.getElementById("filter-name");
  var confSlider = document.getElementById("filter-conf");
  var confVal = document.getElementById("conf-val");
  var countEl = document.getElementById("filter-count");
  var toolDiv = document.getElementById("tool-filters");
  // Discover tools from table data
  var rows = Array.prototype.slice.call(tbody.rows);
  var tools = [];
  rows.forEach(function (r) {
    var t = r.cells[2].getAttribute("data-v");
    if (t && tools.indexOf(t) === -1) tools.push(t);
  });
  tools.sort();
  // Build tool toggle buttons
  var activeTools = {};
  tools.forEach(function (t) {
    activeTools[t] = true;
    var btn = document.createElement("button");
    btn.className = "tool-btn active";
    btn.textContent = t;
    btn.setAttribute("data-tool", t);
    btn.addEventListener("click", function () {
      activeTools[t] = !activeTools[t];
      btn.classList.toggle("active", activeTools[t]);
      applyFilters();
    });
    toolDiv.appendChild(btn);
  });
  confSlider.addEventListener("input", function () {
    confVal.textContent = confSlider.value;
    applyFilters();
  });
  nameInput.addEventListener("input", applyFilters);
  function applyFilters() {
    var query = (nameInput.value || "").toLowerCase();
    var minConf = parseFloat(confSlider.value) || 0;
    var visible = 0;
    rows.forEach(function (r) {
      var name = (r.cells[1].getAttribute("data-v") || "").toLowerCase();
      var tool = r.cells[2].getAttribute("data-v") || "";
      var conf = parseFloat(r.cells[3].getAttribute("data-v"));
      var show = true;
      if (query && name.indexOf(query) === -1) show = false;
      if (!activeTools[tool]) show = false;
      if (!isNaN(conf) && conf < minConf) show = false;
      r.style.display = show ? "" : "none";
      if (show) visible++;
    });
    countEl.textContent = visible + " / " + rows.length;
  }
  applyFilters();
})();

// ---- Interactive PAE heatmaps ----
(function () {
  if (typeof FOLDREPORT_PAE === "undefined") return;
  // Greens_r-like colormap: dark green (low error) → white (high error)
  function paeColor(val, maxVal) {
    var t = Math.min(val / maxVal, 1.0);
    // Greens_r: low values = dark green, high values = light/white
    var r = Math.round(247 - (247 - 0) * (1 - t));
    var g = Math.round(252 - (252 - 68) * (1 - t));
    var b = Math.round(245 - (245 - 27) * (1 - t));
    return "rgb(" + r + "," + g + "," + b + ")";
  }
  function drawPAE(canvasId, tipId, data) {
    var canvas = document.getElementById(canvasId);
    var tip = document.getElementById(tipId);
    if (!canvas || !data) return;
    var size = data.size;
    var matrix = data.matrix;
    var maxVal = Math.max(data.max_val, 1);
    var boundaries = data.chain_boundaries || [];
    var px = Math.min(Math.floor(400 / size), 8);
    if (px < 1) px = 1;
    var dim = size * px;
    canvas.width = dim;
    canvas.height = dim;
    canvas.style.width = Math.min(dim, 400) + "px";
    canvas.style.height = Math.min(dim, 400) + "px";
    var ctx = canvas.getContext("2d");
    // Draw heatmap
    for (var i = 0; i < size; i++) {
      for (var j = 0; j < size; j++) {
        ctx.fillStyle = paeColor(matrix[i][j], maxVal);
        ctx.fillRect(j * px, i * px, px, px);
      }
    }
    // Draw chain boundaries
    ctx.strokeStyle = "rgba(0,0,0,0.5)";
    ctx.lineWidth = 1;
    boundaries.forEach(function (b) {
      var pos = b * px;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, dim); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(dim, pos); ctx.stroke();
    });
    // Tooltip
    canvas.addEventListener("mousemove", function (e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      var cx = Math.floor((e.clientX - rect.left) * scaleX / px);
      var cy = Math.floor((e.clientY - rect.top) * scaleY / px);
      if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
        tip.style.display = "block";
        tip.style.left = (e.clientX - rect.left + 12) + "px";
        tip.style.top = (e.clientY - rect.top - 28) + "px";
        tip.textContent = "Scored: " + (cx + 1) + ", Aligned: " + (cy + 1) + " \u2014 " + matrix[cy][cx].toFixed(1) + " \u00C5";
      } else {
        tip.style.display = "none";
      }
    });
    canvas.addEventListener("mouseleave", function () {
      tip.style.display = "none";
    });
  }
  function initPAE() {
    Object.keys(FOLDREPORT_PAE).forEach(function (id) {
      drawPAE("pae-" + id, "pae-tip-" + id, FOLDREPORT_PAE[id]);
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initPAE);
  } else {
    initPAE();
  }
})();
</script>
<script>
// ---- 3D viewers, colored by pLDDT ----
var FOLDREPORT_MODELS = __MODELS_JSON__;
// pLDDT band colors (very high, confident, low, very low) — matches the figures/legend.
var FOLDREPORT_PLDDT_COLORS = __PLDDT_COLORS_JS__;
(function () {
  function hex(s) { return parseInt(s.replace("#", ""), 16); }
  var palette = FOLDREPORT_PLDDT_COLORS.map(hex);
  function band(atom) {
    var b = atom.b;
    if (b > 90) return palette[0];
    if (b > 70) return palette[1];
    if (b > 50) return palette[2];
    return palette[3];
  }
  // Apply the current display style, always colored by the pLDDT bands.
  function applyStyle(state) {
    var v = state.viewer;
    if (state.caOnly) {
      v.setStyle({}, { sphere: { radius: 1.2, colorfunc: band } });
    } else if (state.style === "stick") {
      v.setStyle({}, { stick: { radius: 0.18, colorfunc: band } });
    } else if (state.style === "sphere") {
      v.setStyle({}, { sphere: { colorfunc: band } });
    } else {
      v.setStyle({}, { cartoon: { colorfunc: band } });
    }
  }

  // Build an XYZ orientation triad anchored at a corner of the structure's
  // bounding box. The arrows rotate with the model, giving a reference frame.
  function buildAxes(state) {
    var v = state.viewer;
    var atoms = state.model.selectedAtoms({});
    if (!atoms.length) return;
    var mn = { x: Infinity, y: Infinity, z: Infinity };
    var mx = { x: -Infinity, y: -Infinity, z: -Infinity };
    atoms.forEach(function (a) {
      if (a.x < mn.x) mn.x = a.x; if (a.y < mn.y) mn.y = a.y; if (a.z < mn.z) mn.z = a.z;
      if (a.x > mx.x) mx.x = a.x; if (a.y > mx.y) mx.y = a.y; if (a.z > mx.z) mx.z = a.z;
    });
    var span = Math.max(mx.x - mn.x, mx.y - mn.y, mx.z - mn.z) || 10;
    var L = Math.max(8, span * 0.22);
    var pad = L * 0.5;
    var o = { x: mn.x - pad, y: mn.y - pad, z: mn.z - pad };
    var r = Math.max(0.15, L * 0.05);
    var defs = [
      { end: { x: o.x + L, y: o.y, z: o.z }, c: 0xe8453c, t: "X" },
      { end: { x: o.x, y: o.y + L, z: o.z }, c: 0x2ca02c, t: "Y" },
      { end: { x: o.x, y: o.y, z: o.z + L }, c: 0x1f6fe5, t: "Z" }
    ];
    state.axes = defs.map(function (d) {
      return {
        shape: v.addArrow({ start: o, end: d.end, radius: r, color: d.c }),
        label: v.addLabel(d.t, {
          position: d.end, fontColor: d.c, fontSize: 13, inFront: true,
          backgroundColor: 0xffffff, backgroundOpacity: 0.6
        })
      };
    });
  }

  function setAxes(state, on) {
    state.axesOn = on;
    if (on && !state.axes) {
      buildAxes(state);
    } else if (!on && state.axes) {
      state.axes.forEach(function (a) {
        state.viewer.removeShape(a.shape);
        state.viewer.removeLabel(a.label);
      });
      state.axes = null;
    }
    state.viewer.render();
  }

  function makeBtn(label, title) {
    var b = document.createElement("button");
    b.type = "button";
    b.className = "viewer-btn";
    b.textContent = label;
    b.title = title;
    return b;
  }

  // Floating toolbar overlaid on each viewer: reset view, spin, axes, style.
  function buildToolbar(state) {
    var bar = document.createElement("div");
    bar.className = "viewer-toolbar";

    var reset = makeBtn("Reset", "Reset the camera to the initial view");
    reset.addEventListener("click", function () {
      state.viewer.setView(state.home);
      state.viewer.render();
    });

    var zoomIn = makeBtn("+", "Zoom in");
    zoomIn.addEventListener("click", function () {
      state.viewer.zoom(1.25, 200);
    });

    var zoomOut = makeBtn("−", "Zoom out");
    zoomOut.addEventListener("click", function () {
      state.viewer.zoom(0.8, 200);
    });

    var spin = makeBtn("Spin", "Toggle automatic rotation");
    spin.addEventListener("click", function () {
      state.spinning = !state.spinning;
      state.viewer.spin(state.spinning ? "y" : false);
      spin.classList.toggle("active", state.spinning);
    });

    var axes = makeBtn("Axes", "Show or hide the XYZ orientation axes");
    axes.classList.add("active");
    axes.addEventListener("click", function () {
      setAxes(state, !state.axesOn);
      axes.classList.toggle("active", state.axesOn);
    });

    var styleOrder = ["cartoon", "stick", "sphere"];
    var styleBtn = makeBtn("Style", "Cycle cartoon / stick / sphere representation");
    if (state.caOnly) {
      styleBtn.disabled = true;
      styleBtn.title = "Only C-alpha atoms available";
    } else {
      styleBtn.addEventListener("click", function () {
        state.style = styleOrder[(styleOrder.indexOf(state.style) + 1) % styleOrder.length];
        applyStyle(state);
        state.viewer.render();
      });
    }

    var png = makeBtn("PNG", "Download this view as a PNG image");
    png.addEventListener("click", function () {
      var uri = state.viewer.pngURI();
      var a = document.createElement("a");
      a.href = uri;
      a.download = state.filename + ".png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    bar.appendChild(zoomIn);
    bar.appendChild(zoomOut);
    bar.appendChild(reset);
    bar.appendChild(spin);
    bar.appendChild(axes);
    bar.appendChild(styleBtn);
    bar.appendChild(png);
    state.el.appendChild(bar);
  }

  function init() {
    if (typeof $3Dmol === "undefined") return;
    Object.keys(FOLDREPORT_MODELS).forEach(function (id) {
      var entry = FOLDREPORT_MODELS[id];
      var el = document.getElementById(id);
      if (!el) return;
      var viewer = $3Dmol.createViewer(el, { backgroundColor: "white" });
      viewer.addModel(entry.data, entry.format);
      var card = el.closest(".card");
      var title = card && card.querySelector("h3") ? card.querySelector("h3").textContent : el.id;
      var state = {
        el: el, viewer: viewer, model: viewer.getModel(),
        caOnly: !!entry.ca_only, style: entry.ca_only ? "sphere" : "cartoon",
        spinning: false, axesOn: false, axes: null,
        filename: title.trim().replace(/[^\w.-]+/g, "_") || el.id
      };
      applyStyle(state);
      viewer.zoomTo();
      viewer.render();
      state.home = viewer.getView();
      setAxes(state, true);
      buildToolbar(state);
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
